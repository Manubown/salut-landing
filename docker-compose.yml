# Coolify reference for salut-landing.
#
# Coolify can deploy this repo directly as a "Dockerfile application" — this
# compose mainly documents the expose pattern. Traefik (managed by Coolify)
# terminates TLS at the domain, so we `expose` the port internally rather
# than publishing it on the host. Mirrors the Coder compose in
# "../docker compose/coolify".
#
# The waitlist is stored by the salut-api service (see ../salut-api); this
# server only proxies to it, so there is no persistent volume here.
services:
  landing:
    build: .
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      HOST: 0.0.0.0
      # Canonical public origin — drives canonical/OG/hreflang + sitemap/robots.
      SITE_URL: https://salut.rocks
      # Hosts the SSR engine accepts (Angular v21 SSRF guard). Coolify/Traefik
      # forwards the real Host; anything not listed falls back to CSR / 400.
      NG_ALLOWED_HOSTS: salut.rocks,www.salut.rocks
      # Backend the landing proxies to server-to-server (browser stays
      # same-origin). Waitlist + pre-register + events all live here.
      WAITLIST_API_URL: https://api.salut.rocks
      SALUT_API_URL: https://api.salut.rocks
