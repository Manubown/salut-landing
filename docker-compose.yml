# Coolify reference for salut-landing.
#
# Coolify can deploy this repo directly as a "Dockerfile application" — this
# compose mainly documents the expose pattern. Traefik (managed by Coolify)
# terminates TLS at the domain, so we `expose` the port internally rather
# than publishing it on the host. Mirrors the Coder compose in
# "../docker compose/coolify".
#
# The waitlist is stored by the salut-api service (see ../salut-api); this
# server only proxies to it, so there is no persistent volume here.
services:
  landing:
    build: .
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      HOST: 0.0.0.0
      # Where the waitlist API lives. Staging api.salut.bown.at, launch
      # api.salut.com. Reached server-to-server (browser stays same-origin).
      WAITLIST_API_URL: https://api.salut.bown.at
