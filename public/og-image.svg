<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#160d28"/>
      <stop offset="1" stop-color="#0b0714"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.0" r="0.9">
      <stop offset="0" stop-color="#7C5CFF" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b6bff"/>
      <stop offset="1" stop-color="#3a1f86"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand mark -->
  <rect x="96" y="150" width="116" height="116" rx="30" fill="url(#mark)"/>
  <text x="154" y="232" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800" fill="#ffffff" text-anchor="middle">S</text>

  <!-- wordmark + tagline -->
  <text x="96" y="380" font-family="Arial, Helvetica, sans-serif" font-size="128" font-weight="800" fill="#ffffff" letter-spacing="-3">Salut</text>
  <text x="100" y="452" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="600" fill="#c9c0e0">Nightlife · Drinks · Friends</text>
  <text x="100" y="516" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#8b8398">Track the night — and your limit — together.</text>

  <!-- divider accent -->
  <rect x="100" y="556" width="220" height="6" rx="3" fill="#7C5CFF"/>
</svg>
